version: "3"

services:
  app:
    build: .
    container_name: "app"
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./test:/app/test
    networks:
      - library

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - library

volumes:
  mongo_data:

networks:
  library:
    driver: bridge
